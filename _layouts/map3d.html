<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Historic Directory Network</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #0b0c10;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #c5c6c7;
        }
        #canvas-container {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0; z-index: 1;
        }
        /* UI Overlay */
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            z-index: 10; pointer-events: auto; /* Changed to auto so the checkbox can be clicked */
        }
        h1 {
            margin: 0 0 5px 0; font-size: 24px; color: #66fcf1;
            text-transform: uppercase; letter-spacing: 2px;
        }
        p { margin: 0; font-size: 13px; color: #45f3ff; opacity: 0.8; }
        
        /* Toggle Switch Container */
        .toggle-container {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #66fcf1;
            background: rgba(26, 28, 36, 0.6);
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid #1f2833;
            width: max-content;
        }
        .toggle-container input {
            cursor: pointer;
            accent-color: #66fcf1;
        }
        
        /* Interactive Sidebar Info Panel — desktop */
        #info-panel {
            position: absolute; top: 20px; right: 20px;
            width: 300px; background: rgba(26, 28, 36, 0.85);
            backdrop-filter: blur(8px); border: 1px solid #1f2833;
            border-top: 3px solid #66fcf1; border-radius: 4px;
            padding: 15px; z-index: 10; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .panel-header { font-size: 11px; text-transform: uppercase; color: #858585; letter-spacing: 1px; }
        .node-title { font-size: 16px; font-weight: bold; color: #fff; margin: 5px 0 10px 0; }
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; }
        .meta-item span { display: block; color: #858585; font-size: 10px; }
        #cross-year-note { display: none; margin-top: 10px; font-size: 11px; color: #45f3ff;
            border-top: 1px solid #1f2833; padding-top: 8px; white-space: pre-line; line-height: 1.6; }
        #cross-year-note.visible { display: block; }

        /* Tooltip style — desktop only */
        #tooltip {
            position: absolute; background: rgba(11, 12, 16, 0.95);
            color: #66fcf1; padding: 5px 10px; border: 1px solid #66fcf1;
            border-radius: 3px; font-size: 12px; pointer-events: none;
            display: none; z-index: 20; font-family: monospace;
        }

        /* Mobile overrides */
        @media (max-width: 600px) {
            #ui-layer { top: 12px; left: 12px; right: 80px; }
            h1 { font-size: 15px; letter-spacing: 1px; }
            p { font-size: 11px; }

            #info-panel {
                top: auto; right: 0; left: 0; bottom: 0;
                width: 100%; border-radius: 12px 12px 0 0;
                border-top: 3px solid #66fcf1;
                transform: translateY(calc(100% - 48px));
                padding: 12px 16px 24px;
                box-sizing: border-box;
            }
            #info-panel.has-selection { transform: translateY(0); }
            .panel-header { font-size: 12px; }
            .node-title { font-size: 15px; }
            #tooltip { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <h1>Directory Chronosphere</h1>
        <p id="hint-text">Drag to rotate · Scroll to zoom · Tap nodes &amp; links</p>
        <!-- Toggle Control Component -->
        <label class="toggle-container">
            <input type="checkbox" id="toggle-links">
            <span>Show Cross-Year Links</span>
        </label>
    </div>

    <div id="info-panel">
        <div class="panel-header">Selected Entry</div>
        <div class="node-title" id="node-name">Tap a node or link</div>
        <div class="meta-grid">
            <div class="meta-item"><span class="label">YEAR</span><div id="node-year">-</div></div>
            <div class="meta-item"><span class="label">STREET</span><div id="node-street">-</div></div>
            <div class="meta-item"><span class="label">SIDE</span><div id="node-side">-</div></div>
            <div class="meta-item"><span class="label">TYPE</span><div id="node-type">-</div></div>
        </div>
        <div id="cross-year-note"></div>
    </div>

    <div id="tooltip"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="map-data.js"></script>

    <script>
        // Global visibility state tracker
        let showCrossYearLinks = false;

        // 1. DATA SAMPLING & BOUNDS CALCULATION
        const knownPoints = directoryData.filter(d => d.lat != null && d.lng != null);

        let minLat = Infinity, maxLat = -Infinity;
        let minLng = Infinity, maxLng = -Infinity;
        const yearsSet = new Set();

        directoryData.forEach(d => yearsSet.add(d.year));
        knownPoints.forEach(d => {
            if (d.lat < minLat) minLat = d.lat;
            if (d.lat > maxLat) maxLat = d.lat;
            if (d.lng < minLng) minLng = d.lng;
            if (d.lng > maxLng) maxLng = d.lng;
        });

        const sortedYears = [...yearsSet].sort((a, b) => a - b);

        const isMobile = window.innerWidth <= 600 || ('ontouchstart' in window);

        // Grid Metric Spacers — wider on mobile for breathing room
        const PLANE_SIZE = isMobile ? 160 : 130;
        const PLANE_SPACING = 30;    
        const latRange = maxLat - minLat || 1;
        const lngRange = maxLng - minLng || 1;

        function mapCoordsToXY(lat, lng) {
            const pctX = (lng - minLng) / lngRange;
            const pctY = (lat - minLat) / latRange;
            const x = (pctX - 0.5) * PLANE_SIZE;
            const z = (pctY - 0.5) * PLANE_SIZE * -1; 
            return { x, z };
        }

        // Native Bezier Street Interpolation Engine from Original Map Source
        function bezier(A, ctrl, B, t) {
            const u = 1 - t;
            return { 
                lat: u*u*A.lat + 2*u*t*ctrl.lat + t*t*B.lat,
                lng: u*u*A.lng + 2*u*t*ctrl.lng + t*t*B.lng 
            };
        }

        function applyOffset(midLat, midLng, arcOffset, side) {
            if (side === 'East' || side === 'West') {
                return { lat: midLat, lng: midLng + arcOffset };
            }
            return { lat: midLat + arcOffset, lng: midLng };
        }

        // Vertical arc amplitude: nodes bow up to this many units above the plane
        const ARC_HEIGHT = 3.5;

        function computeChain(entries, side) {
            const r = entries.map(e => ({ ...e, _yOffset: 0 }));
            const n = r.length;
            const anchors = r.map((e,i) => e.lat != null ? i : -1).filter(i => i >= 0);
            const arcOffset = (side === 'North' || side === 'East') ? 0.0001 : -0.0001;
            const arcSign = 1;

            for (let ai = 0; ai < anchors.length - 1; ai++) {
                const si = anchors[ai], ei = anchors[ai+1];
                const A  = { lat:r[si].lat, lng:r[si].lng };
                const B  = { lat:r[ei].lat, lng:r[ei].lng };
                const ctrl = applyOffset((A.lat+B.lat)/2, (A.lng+B.lng)/2, arcOffset, side);
                const steps = ei - si;
                for (let k = 1; k < steps; k++) {
                    const p = bezier(A, ctrl, B, k/steps);
                    r[si+k].lat = p.lat; r[si+k].lng = p.lng; r[si+k]._computed = true;
                    r[si+k]._yOffset = arcSign * ARC_HEIGHT * Math.sin(Math.PI * k / steps);
                }
            }

            if (anchors.length > 0) {
                const lastAi = anchors[anchors.length - 1];
                const tailCount = n - lastAi - 1;
                if (tailCount > 0) {
                    const A = { lat:r[lastAi].lat, lng:r[lastAi].lng };
                    let dLng = 0, dLat = 0;
                    if (anchors.length >= 2) {
                        const prev = anchors[anchors.length - 2];
                        const len = Math.sqrt(Math.pow(A.lat - r[prev].lat, 2) + Math.pow(A.lng - r[prev].lng, 2)) || 1;
                        dLat = ((A.lat - r[prev].lat)/len) * 0.00014;
                        dLng = ((A.lng - r[prev].lng)/len) * 0.00014;
                    } else {
                        if (side === 'East' || side === 'West') { dLat = -0.00014; }
                        else                                    { dLng =  0.00014; }
                    }
                    const ghost = { lat: A.lat + dLat*(tailCount+1), lng: A.lng + dLng*(tailCount+1) };
                    const ctrl  = applyOffset((A.lat+ghost.lat)/2, (A.lng+ghost.lng)/2, arcOffset, side);
                    for (let k = 1; k <= tailCount; k++) {
                        const p = bezier(A, ctrl, ghost, k/(tailCount+1));
                        r[lastAi+k].lat = p.lat; r[lastAi+k].lng = p.lng; r[lastAi+k]._computed = true;
                        r[lastAi+k]._yOffset = arcSign * ARC_HEIGHT * Math.sin(Math.PI * k / (tailCount + 1));
                    }
                }
            }

            if (anchors.length > 0) {
                const firstAi = anchors[0];
                if (firstAi > 0) {
                    const A = { lat:r[firstAi].lat, lng:r[firstAi].lng };
                    let dLng = 0, dLat = 0;
                    if (anchors.length >= 2) {
                        const next = anchors[1];
                        const len = Math.sqrt(Math.pow(r[next].lat - A.lat, 2) + Math.pow(r[next].lng - A.lng, 2)) || 1;
                        dLat = -((r[next].lat - A.lat)/len) * 0.00014;
                        dLng = -((r[next].lng - A.lng)/len) * 0.00014;
                    } else {
                        if (side === 'East' || side === 'West') { dLat =  0.00014; }
                        else                                    { dLng = -0.00014; }
                    }
                    const ghost = { lat: A.lat + dLat*(firstAi+1), lng: A.lng + dLng*(firstAi+1) };
                    const ctrl  = applyOffset((ghost.lat+A.lat)/2, (ghost.lng+A.lng)/2, arcOffset, side);
                    for (let k = 0; k < firstAi; k++) {
                        const t = (firstAi - k) / (firstAi + 1);
                        const p = bezier(ghost, ctrl, A, t);
                        r[k].lat = p.lat; r[k].lng = p.lng; r[k]._computed = true;
                        const tArc = (firstAi - k) / (firstAi + 1);
                        r[k]._yOffset = arcSign * ARC_HEIGHT * Math.sin(Math.PI * tArc);
                    }
                }
            }
            return r;
        }

        const palette = ['#b5451b', '#b8860b', '#2e7d5e', '#7b5ea7', '#2a64a0'];
        function getYearColor(year) {
            const index = sortedYears.indexOf(year);
            const pct = sortedYears.length <= 1 ? 0 : index / (sortedYears.length - 1);
            const paletteIdx = Math.min(Math.floor(pct * (palette.length - 1)), palette.length - 2);
            return palette[paletteIdx];
        }

        // 2. THREE.JS INITIALIZATION
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b0c10);
        scene.fog = new THREE.FogExp2(0x0b0c10, 0.005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        camera.position.set(PLANE_SIZE * 1.1, sortedYears.length * PLANE_SPACING * 0.8, PLANE_SIZE * 1.3);
        controls.target.set(0, (sortedYears.length * PLANE_SPACING) / 2, 0);

        scene.add(new THREE.AmbientLight(0xffffff, 0.65));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.45);
        dirLight.position.set(30, 50, 10);
        scene.add(dirLight);

        // 3. GENERATION ENGINE FOR LAYERS & CROSS-YEAR CONNECTORS
        const interactiveNodes = [];
        const nodePositionCache = {}; 
        const crossYearTubesList = []; // Tracking array to toggle tube instances in scene loop

        // Loop 1: Map layout floors and process nodes
        sortedYears.forEach((year, layerIdx) => {
            const layerY = layerIdx * PLANE_SPACING;
            const themeColor = getYearColor(year);

            const planeGeo = new THREE.PlaneGeometry(PLANE_SIZE, PLANE_SIZE);
            const planeMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(themeColor),
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.5
            });
            const planeMesh = new THREE.Mesh(planeGeo, planeMat);
            planeMesh.rotation.x = Math.PI / 2;
            planeMesh.position.y = layerY;
            scene.add(planeMesh);

            const wireGeo = new THREE.EdgesGeometry(planeGeo);
            const wireMat = new THREE.LineBasicMaterial({ color: themeColor, transparent: true, opacity: 0.2 });
            const wireframe = new THREE.LineSegments(wireGeo, wireMat);
            wireframe.rotation.x = Math.PI / 2;
            wireframe.position.y = layerY;
            scene.add(wireframe);

            (function addYearLabel(year, layerY, themeColor) {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 160;
                const ctx = canvas.getContext('2d');

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(11, 12, 16, 0.55)';
                const rx = 24;
                ctx.beginPath();
                ctx.moveTo(rx, 10);
                ctx.lineTo(canvas.width - rx, 10);
                ctx.quadraticCurveTo(canvas.width - 4, 10, canvas.width - 4, 10 + rx);
                ctx.lineTo(canvas.width - 4, canvas.height - 10 - rx);
                ctx.quadraticCurveTo(canvas.width - 4, canvas.height - 10, canvas.width - rx, canvas.height - 10);
                ctx.lineTo(rx, canvas.height - 10);
                ctx.quadraticCurveTo(4, canvas.height - 10, 4, canvas.height - 10 - rx);
                ctx.lineTo(4, 10 + rx);
                ctx.quadraticCurveTo(4, 10, rx, 10);
                ctx.closePath();
                ctx.fill();

                ctx.strokeStyle = themeColor;
                ctx.lineWidth = 4;
                ctx.stroke();

                ctx.font = 'bold 108px "Segoe UI", Arial, sans-serif';
                ctx.fillStyle = themeColor;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = themeColor;
                ctx.shadowBlur = 18;
                ctx.fillText(String(year), canvas.width / 2, canvas.height / 2 + 4);

                const texture = new THREE.CanvasTexture(canvas);
                const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });
                const sprite = new THREE.Sprite(spriteMat);

                sprite.position.set(-PLANE_SIZE / 2 - 20, layerY, 0);
                sprite.scale.set(26, 8, 1);
                scene.add(sprite);
            })(year, layerY, themeColor);

            const yearRawEntries = directoryData.filter(d => d.year === year);
            const chainGroups = {};
            yearRawEntries.forEach(entry => {
                const key = `${entry.street}-${entry.cardinality}`;
                if (!chainGroups[key]) chainGroups[key] = [];
                chainGroups[key].push(entry);
            });

            Object.keys(chainGroups).forEach(key => {
                const side = key.split('-')[1];
                const processedNodes = computeChain(chainGroups[key], side);

                const points = [];
                processedNodes.forEach(node => {
                    if(node.lat == null || node.lng == null) return;
                    const localPos = mapCoordsToXY(node.lat, node.lng);
                    const nodePosVector = new THREE.Vector3(localPos.x, layerY + (node._yOffset || 0), localPos.z);
                    points.push(nodePosVector);
                    
                    if (node.crossYearId) {
                        if (!nodePositionCache[node.crossYearId]) nodePositionCache[node.crossYearId] = [];
                        nodePositionCache[node.crossYearId].push({ year, position: nodePosVector, listing: node.listing });
                    }

                    const nodeSz = isMobile ? 1.1 : 0.7;
                    const sphereSz = isMobile ? 0.7 : 0.35;
                    let geom;
                    if (node.type === 'Intersection') {
                        geom = new THREE.BoxGeometry(nodeSz, nodeSz, nodeSz);
                    } else if (node.type === 'Right-of-way') {
                        geom = new THREE.ConeGeometry(nodeSz * 0.55, nodeSz * 1.1, 4);
                    } else {
                        geom = new THREE.SphereGeometry(sphereSz, 8, 8);
                    }

                    let mat;
                    if (node._computed) {
                        mat = new THREE.MeshPhongMaterial({
                            color: new THREE.Color(themeColor),
                            transparent: true,
                            opacity: 0.5,
                            emissive: new THREE.Color(themeColor).multiplyScalar(1.5), 
                            specular: 0xffffff,
                            wireframe: true
                        });
                    } else {
                        mat = new THREE.MeshPhongMaterial({
                            color: new THREE.Color(themeColor),
                            emissive: new THREE.Color(themeColor).multiplyScalar(1.5), 
                            specular: 0xffffff,
                            shininess: 100 
                        });
                    }

                    const mesh = new THREE.Mesh(geom, mat);
                    mesh.position.copy(nodePosVector);
                    mesh.userData = { ...node };

                    scene.add(mesh);
                    interactiveNodes.push(mesh);
                });

                if (points.length > 1) {
                    const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                    const lineMat = new THREE.LineBasicMaterial({ color: new THREE.Color(themeColor), transparent: true, opacity: 0.4 });
                    const streetLine = new THREE.Line(lineGeo, lineMat);
                    scene.add(streetLine);
                }
            });
        });

        // Loop 2: Process Cross-Year threads 
        const crossYearMeshMap = {}; 

        Object.keys(nodePositionCache).forEach(crossId => {
            const sorted = nodePositionCache[crossId].sort((a, b) => a.year - b.year);
            const pointsList = sorted.map(p => p.position);
            const yearSpan = sorted.length; 

            if (pointsList.length > 1) {
                const tubeRadius = 0.12 + Math.max(0, yearSpan - 2) * 0.07;
                const curve = new THREE.CatmullRomCurve3(pointsList);
                const tubeGeo = new THREE.TubeGeometry(curve, pointsList.length * 4, tubeRadius, 6, false);
                const tubeMat = new THREE.MeshPhongMaterial({
                    color: 0x45f3ff,
                    transparent: true,
                    opacity: 0.18,
                    emissive: 0x112233,
                });
                const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
                tubeMesh.userData = { isCrossYearLine: true, crossId, yearSpan, years: sorted.map(p => p.year), listings: sorted.map(p => p.listing) };
                
                // Initial visibility set to FALSE per instructions
                tubeMesh.visible = false; 
                
                scene.add(tubeMesh);
                crossYearMeshMap[crossId] = tubeMesh;
                crossYearTubesList.push(tubeMesh);
                interactiveNodes.push(tubeMesh); 
            }
        });

        // 4. UI INTERACTION HANDLERS & TOGGLE IMPLEMENTATION
        const toggleCheckbox = document.getElementById('toggle-links');
        toggleCheckbox.addEventListener('change', (e) => {
            showCrossYearLinks = e.target.checked;
            crossYearTubesList.forEach(tube => {
                tube.visible = showCrossYearLinks;
            });
            // Clear selections if hidden out from underneath the viewer
            if (!showCrossYearLinks && currentSelected && currentSelected.userData.isCrossYearLine) {
                resetHighlight();
                infoPanel.classList.remove('has-selection');
                lockedSelection = null;
            }
        });

        const raycaster = new THREE.Raycaster();
        raycaster.params.Mesh.threshold = isMobile ? 1.5 : 0.5;
        const pointer = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');
        const infoPanel = document.getElementById('info-panel');
        let currentSelected = null;
        let activeHighlightedLine = null;

        const elName = document.getElementById('node-name');
        const elYear = document.getElementById('node-year');
        const elStreet = document.getElementById('node-street');
        const elSide = document.getElementById('node-side');
        const elType = document.getElementById('node-type');
        const elCrossNote = document.getElementById('cross-year-note');

        function resetHighlight() {
            if (currentSelected) {
                if (currentSelected.userData.isCrossYearLine) {
                    currentSelected.material.opacity = 0.18;
                    currentSelected.material.color.setHex(0x45f3ff);
                    currentSelected.material.emissive.setHex(0x112233);
                } else {
                    if (currentSelected.material.emissive) currentSelected.material.emissive.setHex(0x000000);
                    currentSelected.scale.set(1, 1, 1);
                    const cid = currentSelected.userData.crossYearId;
                    if (cid && crossYearMeshMap[cid]) {
                        crossYearMeshMap[cid].material.opacity = 0.18;
                        crossYearMeshMap[cid].material.color.setHex(0x45f3ff);
                        crossYearMeshMap[cid].material.emissive.setHex(0x112233);
                    }
                }
                currentSelected = null;
            }
            tooltip.style.display = 'none';
            elCrossNote.classList.remove('visible');
        }

        function getValidHits(hits) {
            // Filter out cross-year lines from Raycasting calculation if toggle is false
            return hits.filter(hit => {
                if (hit.object.userData.isCrossYearLine) {
                    return showCrossYearLinks;
                }
                return true;
            });
        }

        function selectObject(obj, screenX, screenY) {
            resetHighlight();
            currentSelected = obj;

            if (obj.userData.isCrossYearLine) {
                obj.material.opacity = 0.95;
                obj.material.color.setHex(0x66fcf1);
                obj.material.emissive.setHex(0x003333);

                const d = obj.userData;
                elName.innerText = `Cross-time link`;
                elYear.innerText = d.years.join(' → ');
                elStreet.innerText = '-';
                elSide.innerText = '-';
                elType.innerText = `${d.yearSpan} year appearances`;
                const lineItems = d.years.map((y, i) => `${y}: ${d.listings[i] || '—'}`).join('\n');
                elCrossNote.innerText = lineItems;
                elCrossNote.classList.add('visible');
            } else {
                if (obj.material.emissive) obj.material.emissive.setHex(0x444444);
                obj.scale.set(1.6, 1.6, 1.6);

                const data = obj.userData;
                tooltip.innerText = data.listing + (data._computed ? ' (Estimated)' : '');
                if (screenX !== undefined) {
                    tooltip.style.left = (event.clientX + 15) + 'px';
                    tooltip.style.top  = (event.clientY + 15) + 'px';
                    tooltip.style.display = isMobile ? 'none' : 'block';
                }

                elName.innerText = data.listing;
                elYear.innerText = data.year;
                elStreet.innerText = data.street;
                elSide.innerText = data.cardinality;
                elType.innerText = (data.type || 'Standard Listing') + (data._computed ? ' [Interpolated]' : ' [Anchored]');

                // Highlight connecting tube only if visibility toggle is active
                if (showCrossYearLinks && data.crossYearId && crossYearMeshMap[data.crossYearId]) {
                    const tube = crossYearMeshMap[data.crossYearId];
                    tube.material.opacity = 0.9;
                    tube.material.color.setHex(0x66fcf1);
                    tube.material.emissive.setHex(0x003333);
                    const d = tube.userData;
                    const lineItems = d.years.map((y, i) => `${y}: ${d.listings[i] || '—'}`).join('\n');
                    elCrossNote.innerText = lineItems;
                    elCrossNote.classList.add('visible');
                }
            }

            infoPanel.classList.add('has-selection');
        }

        let lockedSelection = null;

        window.addEventListener('mousemove', (event) => {
            pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
            tooltip.style.left = (event.clientX + 15) + 'px';
            tooltip.style.top  = (event.clientY + 15) + 'px';
        });

        window.addEventListener('click', (event) => {
            // Prevent canvas clicking from triggering if interacting with UI panel layers
            if(event.target.closest('#ui-layer') || event.target.closest('#info-panel')) return;

            pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const hits = getValidHits(raycaster.intersectObjects(interactiveNodes));
            if (hits.length > 0) {
                lockedSelection = hits[0].object;
                selectObject(lockedSelection, event.clientX, event.clientY);
            } else {
                lockedSelection = null;
                resetHighlight();
                infoPanel.classList.remove('has-selection');
            }
        });

        let touchStartX = 0, touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if(e.target.closest('#ui-layer') || e.target.closest('#info-panel')) return;

            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.sqrt(dx*dx + dy*dy) > 10) return; 
            const touch = e.changedTouches[0];
            pointer.x = (touch.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(touch.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const hits = getValidHits(raycaster.intersectObjects(interactiveNodes));
            if (hits.length > 0) {
                selectObject(hits[0].object);
            } else {
                resetHighlight();
                infoPanel.classList.remove('has-selection');
            }
        }, { passive: true });

        // 5. ANIMATION RENDERING LOOP
        let hoveredObj = null;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (!isMobile && !lockedSelection) {
                raycaster.setFromCamera(pointer, camera);
                const hits = getValidHits(raycaster.intersectObjects(interactiveNodes));
                const hit = hits.length > 0 ? hits[0].object : null;

                if (hit !== hoveredObj) {
                    if (hoveredObj && hoveredObj !== lockedSelection) {
                        if (hoveredObj.userData.isCrossYearLine) {
                            hoveredObj.material.opacity = 0.18;
                            hoveredObj.material.color.setHex(0x45f3ff);
                            hoveredObj.material.emissive.setHex(0x112233);
                        } else {
                            if (hoveredObj.material.emissive) hoveredObj.material.emissive.setHex(0x000000);
                            hoveredObj.scale.set(1, 1, 1);
                            const cid = hoveredObj.userData.crossYearId;
                            if (cid && crossYearMeshMap[cid]) {
                                crossYearMeshMap[cid].material.opacity = 0.18;
                                crossYearMeshMap[cid].material.color.setHex(0x45f3ff);
                            }
                        }
                        tooltip.style.display = 'none';
                        elCrossNote.classList.remove('visible');
                        infoPanel.classList.remove('has-selection');
                    }
                    hoveredObj = hit;
                    if (hit) selectObject(hit, undefined, undefined);
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
