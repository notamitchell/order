<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Historic Directory Network</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #0b0c10;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #c5c6c7;
        }
        #canvas-container {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0; z-index: 1;
        }
        /* UI Overlay */
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            z-index: 10; pointer-events: auto;
        }
        h1 {
            margin: 0 0 5px 0; font-size: 24px; color: #66fcf1;
            text-transform: uppercase; letter-spacing: 2px;
        }
        p { margin: 0; font-size: 13px; color: #45f3ff; opacity: 0.8; }
        
        /* Control Panel */
        .controls-panel {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(26, 28, 36, 0.75);
            backdrop-filter: blur(4px);
            padding: 10px 14px;
            border-radius: 4px;
            border: 1px solid #1f2833;
            width: max-content;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #66fcf1;
        }
        .toggle-container input {
            cursor: pointer;
            accent-color: #66fcf1;
        }

        /* Year Filter Grid */
        .year-filters {
            border-top: 1px solid #1f2833;
            padding-top: 8px;
            margin-top: 4px;
        }
        .filter-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #858585;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px 12px;
        }
        
        /* Google Earth style Navigation Controls */
        #nav-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(26, 28, 36, 0.75);
            backdrop-filter: blur(4px);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #1f2833;
            user-select: none;
            pointer-events: auto;
        }
        .nav-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 32px);
            grid-template-rows: repeat(3, 32px);
            gap: 4px;
            justify-content: center;
        }
        .nav-btn {
            width: 32px;
            height: 32px;
            background: #1f2833;
            border: 1px solid #66fcf1;
            color: #66fcf1;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .nav-btn:hover {
            background: #66fcf1;
            color: #0b0c10;
            box-shadow: 0 0 8px rgba(102, 252, 241, 0.4);
        }
        .nav-btn:active {
            transform: scale(0.92);
        }
        .nav-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #858585;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
            text-align: center;
        }
        
        /* Interactive Sidebar Info Panel — desktop */
        #info-panel {
            position: absolute; top: 20px; right: 20px;
            width: 300px; background: rgba(26, 28, 36, 0.85);
            backdrop-filter: blur(8px); border: 1px solid #1f2833;
            border-top: 3px solid #66fcf1; border-radius: 4px;
            padding: 15px; z-index: 10; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .panel-header { font-size: 11px; text-transform: uppercase; color: #858585; letter-spacing: 1px; }
        .node-title { font-size: 16px; font-weight: bold; color: #fff; margin: 5px 0 10px 0; }
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; }
        .meta-item span { display: block; color: #858585; font-size: 10px; }
        #cross-year-note { display: none; margin-top: 10px; font-size: 11px; color: #45f3ff;
            border-top: 1px solid #1f2833; padding-top: 8px; white-space: pre-line; line-height: 1.6; }
        #cross-year-note.visible { display: block; }

        /* Tooltip style — desktop only */
        #tooltip {
            position: absolute; background: rgba(11, 12, 16, 0.95);
            color: #66fcf1; padding: 5px 10px; border: 1px solid #66fcf1;
            border-radius: 3px; font-size: 12px; pointer-events: none;
            display: none; z-index: 20; font-family: monospace;
        }

        /* Mobile overrides */
        @media (max-width: 600px) {
            #ui-layer { top: 12px; left: 12px; right: 80px; }
            h1 { font-size: 15px; letter-spacing: 1px; }
            p { font-size: 11px; }
            .checkbox-group { grid-template-columns: repeat(3, 1fr); }
            #nav-controls { display: none; }

            #info-panel {
                top: auto; right: 0; left: 0; bottom: 0;
                width: 100%; border-radius: 12px 12px 0 0;
                border-top: 3px solid #66fcf1;
                transform: translateY(calc(100% - 48px));
                padding: 12px 16px 24px;
                box-sizing: border-box;
            }
            #info-panel.has-selection { transform: translateY(0); }
            .panel-header { font-size: 12px; }
            .node-title { font-size: 15px; }
            #tooltip { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <h1>Directory Chronosphere</h1>
        <p id="hint-text">Drag to rotate · Scroll to zoom · Tap nodes &amp; links</p>
        
        <div class="controls-panel">
            <label class="toggle-container">
                <input type="checkbox" id="toggle-links">
                <span>Show Cross-Year Links</span>
            </label>

            <div class="year-filters">
                <div class="filter-title">Visible Years</div>
                <div id="year-checkbox-group" class="checkbox-group">
                    </div>
            </div>
        </div>
    </div>

    <div id="nav-controls">
        <div class="nav-group">
            <div class="nav-label">Pan Map</div>
            <div class="nav-grid">
                <div></div>
                <button class="nav-btn" id="nav-pan-up" title="Pan Up">▲</button>
                <div></div>
                <button class="nav-btn" id="nav-pan-left" title="Pan Left">◀</button>
                <div></div>
                <button class="nav-btn" id="nav-pan-right" title="Pan Right">▶</button>
                <div></div>
                <button class="nav-btn" id="nav-pan-down" title="Pan Down">▼</button>
                <div></div>
            </div>
        </div>

        <div class="nav-group" style="border-top: 1px solid #1f2833; padding-top: 8px;">
            <div class="nav-label">Zoom / Orbit</div>
            <div style="display: flex; gap: 6px;">
                <button class="nav-btn" id="nav-zoom-in" title="Zoom In">+</button>
                <button class="nav-btn" id="nav-zoom-out" title="Zoom Out">−</button>
                <button class="nav-btn" id="nav-rot-left" title="Rotate Left">⟲</button>
                <button class="nav-btn" id="nav-rot-right" title="Rotate Right">⟳</button>
            </div>
        </div>
    </div>

    <div id="info-panel">
        <div class="panel-header">Selected Entry</div>
        <div class="node-title" id="node-name">Tap a node or link</div>
        <div class="meta-grid">
            <div class="meta-item"><span class="label">YEAR</span><div id="node-year">-</div></div>
            <div class="meta-item"><span class="label">STREET</span><div id="node-street">-</div></div>
            <div class="meta-item"><span class="label">SIDE</span><div id="node-side">-</div></div>
            <div class="meta-item"><span class="label">TYPE</span><div id="node-type">-</div></div>
        </div>
        <div id="cross-year-note"></div>
    </div>

    <div id="tooltip"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="map-data.js"></script>

    <script>
        // Global visibility state trackers
        let showCrossYearLinks = false;
        let layersAreMoving = false;
        const visibleYears = new Set(); 

        // 1. DATA SAMPLING & BOUNDS CALCULATION
        const knownPoints = directoryData.filter(d => d.lat != null && d.lng != null);

        let minLat = Infinity, maxLat = -Infinity;
        let minLng = Infinity, maxLng = -Infinity;
        const yearsSet = new Set();

        directoryData.forEach(d => yearsSet.add(d.year));
        knownPoints.forEach(d => {
            if (d.lat < minLat) minLat = d.lat;
            if (d.lat > maxLat) maxLat = d.lat;
            if (d.lng < minLng) minLng = d.lng;
            if (d.lng > maxLng) maxLng = d.lng;
        });

        const sortedYears = [...yearsSet].sort((a, b) => a - b);

        // DEFAULT STATE: Show only the first year initially
        if (sortedYears.length > 0) {
            visibleYears.add(sortedYears[0]);
        }

        const isMobile = window.innerWidth <= 600 || ('ontouchstart' in window);

        const PLANE_SIZE = isMobile ? 160 : 130;
        const PLANE_SPACING = 30;    
        const latRange = maxLat - minLat || 1;
        const lngRange = maxLng - minLng || 1;

        function mapCoordsToXY(lat, lng) {
            const pctX = (lng - minLng) / lngRange;
            const pctY = (lat - minLat) / latRange;
            const x = (pctX - 0.5) * PLANE_SIZE;
            const z = (pctY - 0.5) * PLANE_SIZE * -1; 
            return { x, z };
        }

        function bezier(A, ctrl, B, t) {
            const u = 1 - t;
            return { 
                lat: u*u*A.lat + 2*u*t*ctrl.lat + t*t*B.lat,
                lng: u*u*A.lng + 2*u*t*ctrl.lng + t*t*B.lng 
            };
        }

        function applyOffset(midLat, midLng, arcOffset, side) {
            if (side === 'East' || side === 'West') {
                return { lat: midLat, lng: midLng + arcOffset };
            }
            return { lat: midLat + arcOffset, lng: midLng };
        }

        const ARC_HEIGHT = 3.5;

        function computeChain(entries, side) {
            const r = entries.map(e => ({ ...e, _yOffset: 0 }));
            const n = r.length;
            const anchors = r.map((e,i) => e.lat != null ? i : -1).filter(i => i >= 0);
            const arcOffset = (side === 'North' || side === 'East') ? 0.0001 : -0.0001;
            const arcSign = 1;

            for (let ai = 0; ai < anchors.length - 1; ai++) {
                const si = anchors[ai], ei = anchors[ai+1];
                const A  = { lat:r[si].lat, lng:r[si].lng };
                const B  = { lat:r[ei].lat, lng:r[ei].lng };
                const ctrl = applyOffset((A.lat+B.lat)/2, (A.lng+B.lng)/2, arcOffset, side);
                const steps = ei - si;
                for (let k = 1; k < steps; k++) {
                    const p = bezier(A, ctrl, B, k/steps);
                    r[si+k].lat = p.lat; r[si+k].lng = p.lng; r[si+k]._computed = true;
                    r[si+k]._yOffset = arcSign * ARC_HEIGHT * Math.sin(Math.PI * k / steps);
                }
            }

            if (anchors.length > 0) {
                const lastAi = anchors[anchors.length - 1];
                const tailCount = n - lastAi - 1;
                if (tailCount > 0) {
                    const A = { lat:r[lastAi].lat, lng:r[lastAi].lng };
                    let dLng = 0, dLat = 0;
                    if (anchors.length >= 2) {
                        const prev = anchors[anchors.length - 2];
                        const len = Math.sqrt(Math.pow(A.lat - r[prev].lat, 2) + Math.pow(A.lng - r[prev].lng, 2)) || 1;
                        dLat = ((A.lat - r[prev].lat)/len) * 0.00014;
                        dLng = ((A.lng - r[prev].lng)/len) * 0.00014;
                    } else {
                        if (side === 'East' || side === 'West') { dLat = -0.00014; }
                        else                                    { dLng =  0.00014; }
                    }
                    const ghost = { lat: A.lat + dLat*(tailCount+1), lng: A.lng + dLng*(tailCount+1) };
                    const ctrl  = applyOffset((A.lat+ghost.lat)/2, (A.lng+ghost.lng)/2, arcOffset, side);
                    for (let k = 1; k <= tailCount; k++) {
                        const p = bezier(A, ctrl, ghost, k/(tailCount+1));
                        r[lastAi+k].lat = p.lat; r[lastAi+k].lng = p.lng; r[lastAi+k]._computed = true;
                        r[lastAi+k]._yOffset = arcSign * ARC_HEIGHT * Math.sin(Math.PI * k / (tailCount + 1));
                    }
                }
            }

            if (anchors.length > 0) {
                const firstAi = anchors[0];
                if (firstAi > 0) {
                    const A = { lat:r[firstAi].lat, lng:r[firstAi].lng };
                    let dLng = 0, dLat = 0;
                    if (anchors.length >= 2) {
                        const next = anchors[1];
                        const len = Math.sqrt(Math.pow(r[next].lat - A.lat, 2) + Math.pow(r[next].lng - A.lng, 2)) || 1;
                        dLat = -((r[next].lat - A.lat)/len) * 0.00014;
                        dLng = -((r[next].lng - A.lng)/len) * 0.00014;
                    } else {
                        if (side === 'East' || side === 'West') { dLat =  0.00014; }
                        else                                    { dLng = -0.00014; }
                    }
                    const ghost = { lat: A.lat + dLat*(firstAi+1), lng: A.lng + dLng*(firstAi+1) };
                    const ctrl  = applyOffset((ghost.lat+A.lat)/2, (ghost.lng+A.lng)/2, arcOffset, side);
                    for (let k = 0; k < firstAi; k++) {
                        const t = (firstAi - k) / (firstAi + 1);
                        const p = bezier(ghost, ctrl, A, t);
                        r[k].lat = p.lat; r[k].lng = p.lng; r[k]._computed = true;
                        const tArc = (firstAi - k) / (firstAi + 1);
                        r[k]._yOffset = arcSign * ARC_HEIGHT * Math.sin(Math.PI * tArc);
                    }
                }
            }
            return r;
        }

        const palette = ['#b5451b', '#b8860b', '#2e7d5e', '#7b5ea7', '#2a64a0'];
        function getYearColor(year) {
            const index = sortedYears.indexOf(year);
            const pct = sortedYears.length <= 1 ? 0 : index / (sortedYears.length - 1);
            const paletteIdx = Math.min(Math.floor(pct * (palette.length - 1)), palette.length - 2);
            return palette[paletteIdx];
        }

        // 2. THREE.JS INITIALIZATION
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b0c10);
        scene.fog = new THREE.FogExp2(0x0b0c10, 0.005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        camera.position.set(PLANE_SIZE * 1.1, sortedYears.length * PLANE_SPACING * 0.8, PLANE_SIZE * 1.3);
        controls.target.set(0, (sortedYears.length * PLANE_SPACING) / 2, 0);

        scene.add(new THREE.AmbientLight(0xffffff, 0.65));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.45);
        dirLight.position.set(30, 50, 10);
        scene.add(dirLight);

        // 3. GENERATION ENGINE FOR LAYERS & CROSS-YEAR CONNECTORS
        const interactiveNodes = [];
        const nodePositionCache = {}; 
        const crossYearTubesList = []; 
        const yearGroupsMap = {};

        // Loop 1: Map layout floors and process nodes
        sortedYears.forEach((year, layerIdx) => {
            const layerY = layerIdx * PLANE_SPACING;
            const themeColor = getYearColor(year);

            // Group container for layer visibility control
            const yearGroup = new THREE.Group();
            yearGroup.visible = visibleYears.has(year);
            scene.add(yearGroup);
            yearGroupsMap[year] = yearGroup;

            // Set dynamic interpolation initial properties
            yearGroup.userData.targetY = layerY;
            if(!visibleYears.has(year)) {
                yearGroup.position.y = 0; // Collapsed initially if hidden
            } else {
                yearGroup.position.y = layerY;
            }

            const planeGeo = new THREE.PlaneGeometry(PLANE_SIZE, PLANE_SIZE);
            const planeMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(themeColor),
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.5
            });
            const planeMesh = new THREE.Mesh(planeGeo, planeMat);
            planeMesh.rotation.x = Math.PI / 2;
            yearGroup.add(planeMesh);

            const wireGeo = new THREE.EdgesGeometry(planeGeo);
            const wireMat = new THREE.LineBasicMaterial({ color: themeColor, transparent: true, opacity: 0.2 });
            const wireframe = new THREE.LineSegments(wireGeo, wireMat);
            wireframe.rotation.x = Math.PI / 2;
            yearGroup.add(wireframe);

            (function addYearLabel(year, themeColor) {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 160;
                const ctx = canvas.getContext('2d');

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(11, 12, 16, 0.55)';
                const rx = 24;
                ctx.beginPath();
                ctx.moveTo(rx, 10);
                ctx.lineTo(canvas.width - rx, 10);
                ctx.quadraticCurveTo(canvas.width - 4, 10, canvas.width - 4, 10 + rx);
                ctx.lineTo(canvas.width - 4, canvas.height - 10 - rx);
                ctx.quadraticCurveTo(canvas.width - 4, canvas.height - 10, canvas.width - rx, canvas.height - 10);
                ctx.lineTo(rx, canvas.height - 10);
                ctx.quadraticCurveTo(4, canvas.height - 10, 4, canvas.height - 10 - rx);
                ctx.lineTo(4, 10 + rx);
                ctx.quadraticCurveTo(4, 10, rx, 10);
                ctx.closePath();
                ctx.fill();

                ctx.strokeStyle = themeColor;
                ctx.lineWidth = 4;
                ctx.stroke();

                ctx.font = 'bold 108px "Segoe UI", Arial, sans-serif';
                ctx.fillStyle = themeColor;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = themeColor;
                ctx.shadowBlur = 18;
                ctx.fillText(String(year), canvas.width / 2, canvas.height / 2 + 4);

                const texture = new THREE.CanvasTexture(canvas);
                const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });
                const sprite = new THREE.Sprite(spriteMat);

                sprite.position.set(-PLANE_SIZE / 2 - 20, 0, 0);
                sprite.scale.set(26, 8, 1);
                yearGroup.add(sprite);
            })(year, themeColor);

            const yearRawEntries = directoryData.filter(d => d.year === year);
            const chainGroups = {};
            yearRawEntries.forEach(entry => {
                const key = `${entry.street}-${entry.cardinality}`;
                if (!chainGroups[key]) chainGroups[key] = [];
                chainGroups[key].push(entry);
            });

            Object.keys(chainGroups).forEach(key => {
                const side = key.split('-')[1];
                const processedNodes = computeChain(chainGroups[key], side);

                const points = [];
                processedNodes.forEach(node => {
                    if(node.lat == null || node.lng == null) return;
                    const localPos = mapCoordsToXY(node.lat, node.lng);
                    // Vector calculation now sits native at 0 locally; translated directly by the parent group structure
                    const nodePosVector = new THREE.Vector3(localPos.x, (node._yOffset || 0), localPos.z);
                    points.push(nodePosVector);
                    
                    if (node.crossYearId) {
                        if (!nodePositionCache[node.crossYearId]) nodePositionCache[node.crossYearId] = [];
                        // Save structural reference elements to the parent group so links can query their live absolute positions
                        nodePositionCache[node.crossYearId].push({ year, localPosition: nodePosVector, listing: node.listing, parentGroup: yearGroup });
                    }

                    const nodeSz = isMobile ? 1.1 : 0.7;
                    const sphereSz = isMobile ? 0.7 : 0.35;
                    let geom;
                    if (node.type === 'Intersection') {
                        geom = new THREE.BoxGeometry(nodeSz, nodeSz, nodeSz);
                    } else if (node.type === 'Right-of-way') {
                        geom = new THREE.ConeGeometry(nodeSz * 0.55, nodeSz * 1.1, 4);
                    } else {
                        geom = new THREE.SphereGeometry(sphereSz, 8, 8);
                    }

                    let mat;
                    if (node._computed) {
                        mat = new THREE.MeshPhongMaterial({
                            color: new THREE.Color(themeColor),
                            transparent: true,
                            opacity: 0.5,
                            emissive: new THREE.Color(themeColor).multiplyScalar(1.5), 
                            specular: 0xffffff,
                            wireframe: true
                        });
                    } else {
                        mat = new THREE.MeshPhongMaterial({
                            color: new THREE.Color(themeColor),
                            emissive: new THREE.Color(themeColor).multiplyScalar(1.5), 
                            specular: 0xffffff,
                            shininess: 100 
                        });
                    }

                    const mesh = new THREE.Mesh(geom, mat);
                    mesh.position.copy(nodePosVector);
                    mesh.userData = { ...node };

                    yearGroup.add(mesh);
                    interactiveNodes.push(mesh);
                });

                if (points.length > 1) {
                    const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                    const lineMat = new THREE.LineBasicMaterial({ color: new THREE.Color(themeColor), transparent: true, opacity: 0.4 });
                    const streetLine = new THREE.Line(lineGeo, lineMat);
                    yearGroup.add(streetLine);
                }
            });
        });

        // Loop 2: Process Cross-Year threads 
        const crossYearMeshMap = {}; 

        Object.keys(nodePositionCache).forEach(crossId => {
            const sorted = nodePositionCache[crossId].sort((a, b) => a.year - b.year);
            const yearSpan = sorted.length; 

            if (sorted.length > 1) {
                const tubeRadius = 0.12 + Math.max(0, yearSpan - 2) * 0.07;
                
                // Build a structural template system path using dummy world anchors to form basic geometric setups
                const samplePoints = sorted.map(() => new THREE.Vector3());
                const curve = new THREE.CatmullRomCurve3(samplePoints);
                const tubeGeo = new THREE.TubeGeometry(curve, sorted.length * 4, tubeRadius, 6, false);
                
                const tubeMat = new THREE.MeshPhongMaterial({
                    color: 0x45f3ff,
                    transparent: true,
                    opacity: 0.18,
                    emissive: 0x112233,
                });
                const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
                tubeMesh.userData = { 
                    isCrossYearLine: true, 
                    crossId, 
                    yearSpan, 
                    years: sorted.map(p => p.year), 
                    listings: sorted.map(p => p.listing),
                    rawAnchors: sorted // Retain active memory linkage mapping to local coordinate references
                };
                
                tubeMesh.visible = false; 
                
                scene.add(tubeMesh);
                crossYearMeshMap[crossId] = tubeMesh;
                crossYearTubesList.push(tubeMesh);
                interactiveNodes.push(tubeMesh); 
            }
        });

        // 4. UI INTERACTION HANDLERS & TOGGLE IMPLEMENTATION
        
        // Dynamic Checkbox Injection
        const checkGroupContainer = document.getElementById('year-checkbox-group');
        sortedYears.forEach(year => {
            const label = document.createElement('label');
            label.className = 'toggle-container';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = year;
            checkbox.checked = visibleYears.has(year);
            
            checkbox.addEventListener('change', (e) => {
                const targetYear = parseInt(e.target.value);
                if (e.target.checked) {
                    visibleYears.add(targetYear);
                } else {
                    visibleYears.delete(targetYear);
                }
                
                // Trigger dynamic restructuring updates
                recalculateLayerTargets();
                
                if (currentSelected && !currentSelected.userData.isCrossYearLine && currentSelected.userData.year === targetYear) {
                    clearActiveSelection();
                }
            });
            
            const span = document.createElement('span');
            span.innerText = year;
            
            label.appendChild(checkbox);
            label.appendChild(span);
            checkGroupContainer.appendChild(label);
        });

        const toggleCheckbox = document.getElementById('toggle-links');
        toggleCheckbox.addEventListener('change', (e) => {
            showCrossYearLinks = e.target.checked;
            updateCrossYearTubesVisibility();
            
            if (!showCrossYearLinks && currentSelected && currentSelected.userData.isCrossYearLine) {
                clearActiveSelection();
            }
        });

        // Calculate layout targets based exclusively on active selections
        function recalculateLayerTargets() {
            let visibleIndex = 0;
            sortedYears.forEach(year => {
                const group = yearGroupsMap[year];
                if (visibleYears.has(year)) {
                    group.userData.targetY = visibleIndex * PLANE_SPACING;
                    visibleIndex++;
                } else {
                    // Pull unselected layers down safely to a flat plane layout matrix base coordinate space
                    group.userData.targetY = 0; 
                }
            });
            
            // Flag layout transitions to cleanly fade threads out during transition
            layersAreMoving = true;
            updateCrossYearTubesVisibility();
        }

        // Evaluate live alignment conditions
        function updateCrossYearTubesVisibility() {
            crossYearTubesList.forEach(tube => {
                // If switch is off OR layers are mid-slide, keep links fully hidden (Fast & Clean approach)
                if (!showCrossYearLinks || layersAreMoving) {
                    tube.visible = false;
                    return;
                }
                const visibleSpanCount = tube.userData.years.filter(y => visibleYears.has(y)).length;
                tube.visible = visibleSpanCount >= 2;
            });
        }

        // Live structural updates tracking world coordinate maps
        function rebuildActiveTubeGeometries() {
            crossYearTubesList.forEach(tube => {
                if (!tube.visible) return;
                
                // Collect live world vector placements mapping current parent group transitions
                const currentWorldPoints = tube.userData.rawAnchors.map(anchor => {
                    const pt = anchor.localPosition.clone();
                    pt.y += anchor.parentGroup.position.y; // Append running runtime height transformations
                    return pt;
                });
                
                const curve = new THREE.CatmullRomCurve3(currentWorldPoints);
                const tubeRadius = 0.12 + Math.max(0, tube.userData.yearSpan - 2) * 0.07;
                
                // Hot swap active operational geometry paths safely
                tube.geometry.dispose();
                tube.geometry = new THREE.TubeGeometry(curve, tube.userData.yearSpan * 4, tubeRadius, 6, false);
            });
        }

        function clearActiveSelection() {
            resetHighlight();
            infoPanel.classList.remove('has-selection');
            lockedSelection = null;
        }

        // CAMERA NAVIGATION ENGINE (Google Earth Pro Inspired)
        const PAN_SPEED = 8;
        const ZOOM_SPEED = 0.15;
        const ROTATE_SPEED = 0.25;

        function panCamera(deltaX, deltaY) {
            const right = new THREE.Vector3();
            camera.matrix.extractBasis(right, new THREE.Vector3(), new THREE.Vector3());
            right.y = 0;
            right.normalize();
            
            const forward = new THREE.Vector3(right.z, 0, -right.x);

            const translation = new THREE.Vector3()
                .addScaledVector(right, deltaX * PAN_SPEED)
                .addScaledVector(forward, deltaY * PAN_SPEED);

            camera.position.add(translation);
            controls.target.add(translation);
            controls.update();
        }

        function zoomCamera(direction) {
            const offset = new THREE.Vector3().subVectors(camera.position, controls.target);
            if (direction === 'in') {
                offset.multiplyScalar(1 - ZOOM_SPEED);
            } else {
                offset.multiplyScalar(1 + ZOOM_SPEED);
            }
            camera.position.copy(controls.target).add(offset);
            controls.update();
        }

        function rotateCamera(direction) {
            const offset = new THREE.Vector3().subVectors(camera.position, controls.target);
            const spherical = new THREE.Spherical().setFromVector3(offset);
            
            if (direction === 'left') {
                spherical.theta -= ROTATE_SPEED;
            } else {
                spherical.theta += ROTATE_SPEED;
            }
            
            spherical.makeSafe();
            offset.setFromSpherical(spherical);
            camera.position.copy(controls.target).add(offset);
            controls.update();
        }

        // Navigation UI Listeners
        document.getElementById('nav-pan-up').addEventListener('click', () => panCamera(0, 1));
        document.getElementById('nav-pan-down').addEventListener('click', () => panCamera(0, -1));
        document.getElementById('nav-pan-left').addEventListener('click', () => panCamera(-1, 0));
        document.getElementById('nav-pan-right').addEventListener('click', () => panCamera(1, 0));
        document.getElementById('nav-zoom-in').addEventListener('click', () => zoomCamera('in'));
        document.getElementById('nav-zoom-out').addEventListener('click', () => zoomCamera('out'));
        document.getElementById('nav-rot-left').addEventListener('click', () => rotateCamera('left'));
        document.getElementById('nav-rot-right').addEventListener('click', () => rotateCamera('right'));


        // RAYCASTING AND INTERACTION SELECTION
        const raycaster = new THREE.Raycaster();
        raycaster.params.Mesh.threshold = isMobile ? 1.5 : 0.5;
        const pointer = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');
        const infoPanel = document.getElementById('info-panel');
        let currentSelected = null;
        let activeHighlightedLine = null;

        const elName = document.getElementById('node-name');
        const elYear = document.getElementById('node-year');
        const elStreet = document.getElementById('node-street');
        const elSide = document.getElementById('node-side');
        const elType = document.getElementById('node-type');
        const elCrossNote = document.getElementById('cross-year-note');

        function resetHighlight() {
            if (currentSelected) {
                if (currentSelected.userData.isCrossYearLine) {
                    currentSelected.material.opacity = 0.18;
                    currentSelected.material.color.setHex(0x45f3ff);
                    currentSelected.material.emissive.setHex(0x112233);
                } else {
                    if (currentSelected.material.emissive) currentSelected.material.emissive.setHex(0x000000);
                    currentSelected.scale.set(1, 1, 1);
                    const cid = currentSelected.userData.crossYearId;
                    if (cid && crossYearMeshMap[cid]) {
                        crossYearMeshMap[cid].material.opacity = 0.18;
                        crossYearMeshMap[cid].material.color.setHex(0x45f3ff);
                        crossYearMeshMap[cid].material.emissive.setHex(0x112233);
                    }
                }
                currentSelected = null;
            }
            tooltip.style.display = 'none';
            elCrossNote.classList.remove('visible');
        }

        function getValidHits(hits) {
            return hits.filter(hit => {
                const data = hit.object.userData;
                if (data.isCrossYearLine) {
                    return hit.object.visible;
                }
                return visibleYears.has(data.year);
            });
        }

        function selectObject(obj, screenX, screenY) {
            resetHighlight();
            currentSelected = obj;

            if (obj.userData.isCrossYearLine) {
                obj.material.opacity = 0.95;
                obj.material.color.setHex(0x66fcf1);
                obj.material.emissive.setHex(0x003333);

                const d = obj.userData;
                elName.innerText = `Cross-time link`;
                elYear.innerText = d.years.join(' → ');
                elStreet.innerText = '-';
                elSide.innerText = '-';
                elType.innerText = `${d.yearSpan} year appearances`;
                const lineItems = d.years.map((y, i) => `${y}: ${d.listings[i] || '—'}`).join('\n');
                elCrossNote.innerText = lineItems;
                elCrossNote.classList.add('visible');
            } else {
                if (obj.material.emissive) obj.material.emissive.setHex(0x444444);
                obj.scale.set(1.6, 1.6, 1.6);

                const data = obj.userData;
                tooltip.innerText = data.listing + (data._computed ? ' (Estimated)' : '');
                if (screenX !== undefined) {
                    tooltip.style.left = (screenX + 15) + 'px';
                    tooltip.style.top  = (screenY + 15) + 'px';
                    tooltip.style.display = isMobile ? 'none' : 'block';
                }

                elName.innerText = data.listing;
                elYear.innerText = data.year;
                elStreet.innerText = data.street;
                elSide.innerText = data.cardinality;
                elType.innerText = (data.type || 'Standard Listing') + (data._computed ? ' [Interpolated]' : ' [Anchored]');

                if (showCrossYearLinks && data.crossYearId && crossYearMeshMap[data.crossYearId] && crossYearMeshMap[data.crossYearId].visible) {
                    const tube = crossYearMeshMap[data.crossYearId];
                    tube.material.opacity = 0.9;
                    tube.material.color.setHex(0x66fcf1);
                    tube.material.emissive.setHex(0x003333);
                    const d = tube.userData;
                    const lineItems = d.years.map((y, i) => `${y}: ${d.listings[i] || '—'}`).join('\n');
                    elCrossNote.innerText = lineItems;
                    elCrossNote.classList.add('visible');
                }
            }

            infoPanel.classList.add('has-selection');
        }

        let lockedSelection = null;

        window.addEventListener('mousemove', (event) => {
            pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
            tooltip.style.left = (event.clientX + 15) + 'px';
            tooltip.style.top  = (event.clientY + 15) + 'px';
        });

        window.addEventListener('click', (event) => {
            if(event.target.closest('#ui-layer') || event.target.closest('#info-panel') || event.target.closest('#nav-controls')) return;

            pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const hits = getValidHits(raycaster.intersectObjects(interactiveNodes));
            if (hits.length > 0) {
                lockedSelection = hits[0].object;
                selectObject(lockedSelection, event.clientX, event.clientY);
            } else {
                lockedSelection = null;
                resetHighlight();
                infoPanel.classList.remove('has-selection');
            }
        });

        let touchStartX = 0, touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if(e.target.closest('#ui-layer') || e.target.closest('#info-panel') || e.target.closest('#nav-controls')) return;

            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.sqrt(dx*dx + dy*dy) > 10) return; 
            const touch = e.changedTouches[0];
            pointer.x = (touch.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(touch.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const hits = getValidHits(raycaster.intersectObjects(interactiveNodes));
            if (hits.length > 0) {
                selectObject(hits[0].object);
            } else {
                resetHighlight();
                infoPanel.classList.remove('has-selection');
            }
        }, { passive: true });

        // Initial setup execution mapping configuration values
        recalculateLayerTargets();

        // 5. ANIMATION RENDERING LOOP
        let hoveredObj = null;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Run interpolation movements across floor layers
            let displacementOccurred = false;
            
            sortedYears.forEach(year => {
                const group = yearGroupsMap[year];
                if (group) {
                    const target = group.userData.targetY;
                    
                    if (visibleYears.has(year)) {
                        group.visible = true;
                    }

                    // Calculate remaining delta path
                    const delta = target - group.position.y;
                    if (Math.abs(delta) > 0.005) {
                        // Linear interpolation sliding step (12% closer per frame loop)
                        group.position.y += delta * 0.12;
                        displacementOccurred = true;
                    } else {
                        group.position.y = target; // Lock axis placement directly
                    }

                    // Turn off rendering for hidden groups once collapsed back to baseline zero position
                    if (!visibleYears.has(year) && group.position.y === 0) {
                        group.visible = false;
                    }
                }
            });

            // Handle cross-year connector updates
            if (displacementOccurred) {
                // If layers are sliding, ensure tube linkages are turned off
                if (showCrossYearLinks) {
                    crossYearTubesList.forEach(t => t.visible = false);
                }
            } else if (layersAreMoving) {
                // Triggered precisely on the single frame completion point when movement terminates
                layersAreMoving = false;
                updateCrossYearTubesVisibility();
                rebuildActiveTubeGeometries();
            }

            if (!isMobile && !lockedSelection) {
                raycaster.setFromCamera(pointer, camera);
                const hits = getValidHits(raycaster.intersectObjects(interactiveNodes));
                const hit = hits.length > 0 ? hits[0].object : null;

                if (hit !== hoveredObj) {
                    if (hoveredObj && hoveredObj !== lockedSelection) {
                        if (hoveredObj.userData.isCrossYearLine) {
                            hoveredObj.material.opacity = 0.18;
                            hoveredObj.material.color.setHex(0x45f3ff);
                            hoveredObj.material.emissive.setHex(0x112233);
                        } else {
                            if (hoveredObj.material.emissive) hoveredObj.material.emissive.setHex(0x000000);
                            hoveredObj.scale.set(1, 1, 1);
                            const cid = hoveredObj.userData.crossYearId;
                            if (cid && crossYearMeshMap[cid]) {
                                crossYearMeshMap[cid].material.opacity = 0.18;
                                crossYearMeshMap[cid].material.color.setHex(0x45f3ff);
                            }
                        }
                        tooltip.style.display = 'none';
                        elCrossNote.classList.remove('visible');
                        infoPanel.classList.remove('has-selection');
                    }
                    hoveredObj = hit;
                    if (hit) selectObject(hit, undefined, undefined);
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
