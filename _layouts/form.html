<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contribution Form</title>
  
  <!-- Map Data File -->
  <script src="map-data.js"></script>

  <!-- Quill WYSIWYG Editor Styles -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #2c3e50;
      background-color: #f4f7f6;
      line-height: 1.6;
    }
    .form-card {
      max-width: 700px;
      margin: 0 auto;
      background: #ffffff;
      padding: 30px;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    h2 {
      margin-top: 0;
      color: #1a2b4c;
      font-size: 24px;
      border-bottom: 1px solid #e1e4e8;
      padding-bottom: 12px;
    }
    
    /* --- Styles for dynamic directory details --- */
    .entity-container {
      margin-bottom: 25px;
    }
    .entity-card {
      background-color: #f8f9fa;
      border: 1px solid #e9ecef;
      border-left: 4px solid #1a2b4c;
      border-radius: 4px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .entity-card h3 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 16px;
      color: #1a2b4c;
    }
    .entity-card ul {
      list-style-type: none;
      padding-left: 0;
      margin: 0;
    }
    .entity-card li {
      font-size: 14px;
      margin-bottom: 6px;
      border-bottom: 1px dashed #e1e4e8;
      padding-bottom: 4px;
    }
    .entity-card li:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .entity-card .prop-key {
      font-weight: 600;
      color: #4a5568;
    }
    /* ------------------------------------------- */

    .field-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 14px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5da;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    #editor-container {
      height: 220px;
      border-bottom-left-radius: 4px;
      border-bottom-right-radius: 4px;
    }
    button {
      background-color: #2ea44f;
      color: white;
      border: 1px solid rgba(27,31,35,0.15);
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }
    button:disabled {
      background-color: #94d3a2;
      cursor: not-allowed;
    }
    #status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 4px;
      display: none;
      font-size: 14px;
      font-weight: 500;
    }
    .success { background-color: #dcffe4; color: #1a7f37; border: 1px solid #4ac26b; }
    .error { background-color: #ffebe9; color: #cf222e; border: 1px solid #ff8182; }
  </style>
</head>
<body>

<div class="form-card">
  <!-- Container for dynamically loaded Directory Data -->
  <div id="details-container"></div>

  <h2>Suggest Article contents</h2>
  <p><i>Instructions go here. Links to editorial guidance, etc. </i></p>
  
  <form id="submissionForm">
    <div class="field-group">
      <label for="authorName">Contributor / Author Name</label>
      <input type="text" id="authorName" placeholder="e.g. Dr. John Smith" required />
    </div>

    <div class="field-group">
      <label for="articleTitle">Proposed Article Title</label>
      <input type="text" id="articleTitle" placeholder="e.g. Princes Bridge" required />
    </div>

    <div class="field-group">
      <label>Proposed Article Content</label>
      <div id="editor-container"></div>
    </div>

    <input type="hidden" id="prefilledId" placeholder="e.g. princes-bridge" />

    <button type="submit" id="submitBtn">Submit Contribution</button>
  </form>

  <div id="status"></div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTaAc0BbSxGt3DSiXgMfI_XoPrkxt_3rJV8foBasiuoLThA12jkPMUUYj9381gMbedIw/exec";

  // Auto-fill query parameters if present
  const urlParams = new URLSearchParams(window.location.search);
  const targetId = urlParams.get('id');

  if (targetId) document.getElementById('prefilledId').value = targetId;
  if (urlParams.get('title')) document.getElementById('articleTitle').value = urlParams.get('title');

  // --- Dynamic Directory Data Rendering ---
  if (targetId && typeof directoryData !== 'undefined' && Array.isArray(directoryData)) {
    // Find all records matching the target entityID (comparing both string and number)
    const matchingEntries = directoryData.filter(item => item.entityID == targetId);

    if (matchingEntries.length > 0) {
      const detailsContainer = document.getElementById('details-container');
      
      let html = '<div class="entity-container">';
      
      matchingEntries.forEach((entry, index) => {
        html += `<div class="entity-card">`;
        if (matchingEntries.length > 1) {
          html += `<h3>Item #${index + 1}</h3>`;
        }
        html += `<ul>`;
        
        // Loop through whatever key-value pairs are found inside the record
        for (const [key, value] of Object.entries(entry)) {
          if (value !== null && value !== undefined) {
            // Capitalize key name (e.g. "entityID" -> "EntityID", "street" -> "Street")
            const formattedKey = key.charAt(0).toUpperCase() + key.slice(1);
            html += `<li><span class="prop-key">${formattedKey}:</span> ${value}</li>`;
          }
        }
        
        html += `</ul></div>`;
      });

      html += '</div>';
      detailsContainer.innerHTML = html;
    }
  }

  // Initialize Quill Editor
  const quill = new Quill('#editor-container', {
    modules: {
      toolbar: [
        ['bold', 'italic', 'underline'],
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
        ['link'],
        ['clean']
      ]
    },
    placeholder: 'Type or paste the entry content here...',
    theme: 'snow'
  });

  const form = document.getElementById('submissionForm');
  const submitBtn = document.getElementById('submitBtn');
  const statusDiv = document.getElementById('status');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const authorNameInput = document.getElementById('authorName').value.trim();
    const articleTitleInput = document.getElementById('articleTitle').value.trim();
    const prefilledIdInput = document.getElementById('prefilledId').value.trim();
    const richTextHTML = quill.root.innerHTML;
    const plainText = quill.getText().trim();

    // --- Basic Validation ---
    if (!authorNameInput) {
      showStatus("Please enter the Contributor / Author Name.", "error");
      return;
    }

    if (!articleTitleInput) {
      showStatus("Please enter an Article Title.", "error");
      return;
    }

    if (plainText.length === 0) {
      showStatus("Please write some content before submitting.", "error");
      return;
    }

    // --- ID Fallback Logic ---
    const finalId = prefilledIdInput || articleTitleInput;

    const payload = {
      authorName: authorNameInput,
      articleTitle: articleTitleInput,
      prefilledId: finalId,
      articleText: richTextHTML
    };

    submitBtn.disabled = true;
    submitBtn.innerText = "Submitting contribution...";
    statusDiv.style.display = "none";

    try {
      // POST request to Apps Script Web App
      const response = await fetch(SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      if (result.status === "success") {
        showStatus("🎉 Submission received! We'll review it shortly.", "success");
        form.reset();
        quill.setText('');
      } else {
        showStatus("Error: " + result.message, "error");
      }
    } catch (err) {
      showStatus("Submission failed. Please check network connection or let us know if the problem persists.", "error");
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerText = "Submit Contribution";
    }
  });

  function showStatus(text, type) {
    statusDiv.className = type;
    statusDiv.innerText = text;
    statusDiv.style.display = "block";
  }
</script>

</body>
</html>
