<!DOCTYPE html>

    <title>Map Directory</title>

    <style>
        html, body, #map {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #1a1a1a;
            font-family: 'Georgia', serif;
        }
        .leaflet-control-layers {
            max-height: 85vh; width: 320px; overflow-y: auto;
            background: rgba(245,240,230,0.97) !important;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            border-radius: 4px; padding: 10px !important;
            border: 1px solid #c8b89a;
        }
        .panel-section-title {
            font-size: 10px; font-weight: bold; letter-spacing: 0.12em;
            text-transform: uppercase; color: #7a6a55;
            margin: 12px 0 6px 0; padding-bottom: 3px;
            border-bottom: 1px solid #d5c9b5;
        }
        .layer-control-row {
            display: flex; flex-direction: column;
            margin-bottom: 8px; padding-bottom: 8px;
            border-bottom: 1px solid #e8e0d0;
        }
        .layer-control-row:last-child { border-bottom: none; }
        .layer-label-container {
            display: flex; align-items: center; font-size: 12px;
            color: #3a2e22; cursor: pointer; font-family: 'Georgia', serif;
        }
        .layer-label-container input { margin-right: 8px; }
        .slider-container {
            display: flex; align-items: center; margin-top: 4px;
            margin-left: 22px; font-size: 10px; color: #8a7a65;
            font-family: Arial, sans-serif;
        }
        .opacity-slider { flex-grow: 1; margin: 0 6px; cursor: pointer; }
        .year-row {
            display: flex; align-items: center; margin-bottom: 6px;
            font-size: 12px; color: #3a2e22; cursor: pointer;
            font-family: 'Georgia', serif;
        }
        .year-row input { margin-right: 8px; }
        .year-swatch {
            width: 12px; height: 12px; border-radius: 50%;
            margin-right: 6px; flex-shrink: 0;
            border: 1.5px solid rgba(0,0,0,0.2);
        }
        .control-home-link {
            display: block; text-align: center;
            background-color: #2c3e50; color: #f0e8d8 !important;
            text-decoration: none; font-weight: bold; font-size: 12px;
            font-family: 'Georgia', serif; padding: 7px 12px;
            border-radius: 3px; margin-bottom: 12px;
            transition: background-color 0.2s; letter-spacing: 0.05em;
        }
        .control-home-link:hover { background-color: #34495e; }
        .custom-modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.55); backdrop-filter: blur(2px);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: #faf6ee; padding: 24px; border-radius: 4px;
            width: 90%; max-width: 480px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.35); position: relative;
            border: 1px solid #c8b89a; animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(-12px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .modal-close {
            position: absolute; top: 14px; right: 16px;
            font-size: 22px; font-weight: bold;
            color: #aaa; cursor: pointer; transition: color 0.2s;
        }
        .modal-close:hover { color: #333; }
        #modal-heading {
            margin-top: 0; color: #1e1209;
            border-bottom: 2px solid #e0d4be;
            padding-bottom: 8px; font-size: 18px; font-family: 'Georgia', serif;
        }
        #modal-meta {
            font-size: 11px; color: #9a8a74; margin-bottom: 10px;
            font-family: Arial, sans-serif; letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        #modal-body {
            font-size: 13px; line-height: 1.6;
            color: #3a2e22; margin-bottom: 14px; font-family: 'Georgia', serif;
        }
        .coords-box {
            background-color: #f0ebe0; border: 1px solid #ddd0bb;
            border-radius: 3px; padding: 8px; font-family: monospace;
            font-size: 11px; color: #666; word-break: break-all;
            max-height: 80px; overflow-y: auto;
        }
        .leaflet-tooltip {
            font-family: 'Georgia', serif; font-size: 12px;
            background: rgba(30,18,9,0.88); color: #f0e8d8;
            border: 1px solid #7a6a55; border-radius: 3px;
            padding: 3px 7px; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            white-space: nowrap;
        }
        .leaflet-tooltip-top:before { border-top-color: rgba(30,18,9,0.88); }
    </style>

const YEARS = [...new Set(directoryData.map(e => e.year))].sort((a,b) => a - b);

// Interpolate a colour for each year across a fixed palette:
// oldest → warm amber, stepping through teal/violet/green → newest cool blue.
// Works for any number of years automatically.
(function() {
    const palette = [
        [181,  69, 27],  // warm rust
        [184, 134, 11],  // amber
        [46, 125, 94],   // teal green
        [123, 94, 167],  // violet
        [42, 100, 160],  // steel blue
    ];
    function lerp(a, b, t) { return a + (b - a) * t; }
    function toHex(r,g,b) {
        return '#' + [r,g,b].map(v => Math.round(v).toString(16).padStart(2,'0')).join('');
    }
    window.YEAR_COLORS = {};
    YEARS.forEach((year, i) => {
        const t   = YEARS.length === 1 ? 0 : i / (YEARS.length - 1);
        const raw = t * (palette.length - 1);
        const lo  = Math.floor(raw), hi = Math.min(lo + 1, palette.length - 1);
        const f   = raw - lo;
        const r   = lerp(palette[lo][0], palette[hi][0], f);
        const g   = lerp(palette[lo][1], palette[hi][1], f);
        const b   = lerp(palette[lo][2], palette[hi][2], f);
        YEAR_COLORS[year] = toHex(r, g, b);
    });
})();
const MAX_ARC_OFFSET  = 0.00072; // constant outer bound (degrees lat)
const ANIM_DURATION   = 600;     // ms

const map = L.map('map', { center:[-37.8009,144.9622], zoom:18, minZoom:2, maxZoom:20 });

// Permanent anchor line between two intersections shared across years.
// We find the pair of named intersections (same normalised listing, same street,
// same cardinality) that appear in the most years and have known coordinates,
// then draw a line between the first two such anchors in document order.
(function() {
    // Collect all entries that are Intersections with coordinates
    const anchors = directoryData.filter(e => e.type === 'Intersection' && e.lat != null);

    // Build a map: normKey → [{lat,lng}, ...]
    const byKey = {};
    anchors.forEach(e => {
        const key = `${e.street}|${e.cardinality}|${e.listing.toLowerCase().replace(/\s+/g,'_')}`;
        if (!byKey[key]) byKey[key] = [];
        // Store unique lat/lng (same coords appear across years)
        const already = byKey[key].some(p => p.lat === e.lat && p.lng === e.lng);
        if (!already) byKey[key].push({ lat: e.lat, lng: e.lng });
    });

    // Among groups that appear in ≥2 years and share a street+cardinality,
    // pick the two most-attested ones as line endpoints.
    // Group by street+cardinality first, collect qualifying intersection names.
    const byStreetSide = {};
    Object.entries(byKey).forEach(([key, pts]) => {
        // Only candidates that have exactly one unique coord (stable location)
        if (pts.length !== 1) return;
        const [street, card] = key.split('|');
        const sc = `${street}|${card}`;
        if (!byStreetSide[sc]) byStreetSide[sc] = [];
        byStreetSide[sc].push({ key, lat: pts[0].lat, lng: pts[0].lng });
    });

    // Find the street+side with ≥2 candidates; prefer most candidates
    let best = null, bestCount = 0;
    Object.entries(byStreetSide).forEach(([sc, list]) => {
        if (list.length >= 2 && list.length > bestCount) {
            bestCount = list.length;
            best = list;
        }
    });

    if (best && best.length >= 2) {
        // Use document order: find first two in directoryData
        const coordPairs = best.map(b => [b.lat, b.lng]);
        L.polyline([coordPairs[0], coordPairs[1]], { color:'#000000', weight:2.5, opacity:1 }).addTo(map);
    }
})();

//  ARC GEOMETRY
// ═══════════════════════════════════════════════════════════
function bezier(A, ctrl, B, t) {
    const u = 1 - t;
    return { lat: u*u*A.lat + 2*u*t*ctrl.lat + t*t*B.lat,
             lng: u*u*A.lng + 2*u*t*ctrl.lng + t*t*B.lng };
}

/**
 * Compute arc positions for one year+side chain.
 * arcOffset: positive = north/east, negative = south/west. Magnitude sets bow amount.
 *
 * For tail/head segments (one open end), we project a ghost anchor
 * in the STREET direction (east/west) while preserving the correct
 * lateral offset so the arc always bows the right way.
 */
/**
 * Apply arcOffset to the correct geographic axis:
 *   - North/South sides: offset perpendicular to an east-west street → nudge latitude
 *   - East/West sides:   offset perpendicular to a north-south street → nudge longitude
 * Returns { lat, lng } with the bow applied.
 */
function applyOffset(midLat, midLng, arcOffset, side) {
    if (side === 'East' || side === 'West') {
        return { lat: midLat, lng: midLng + arcOffset };
    }
    return { lat: midLat + arcOffset, lng: midLng };
}

function computeChain(entries, arcOffset, side) {
    const r = entries.map(e => ({ ...e }));
    const n = r.length;

    // Identify anchor indices
    const anchors = r.map((e,i) => e.lat != null ? i : -1).filter(i => i >= 0);

    // ── Anchored segments between consecutive anchors ──
    for (let ai = 0; ai < anchors.length - 1; ai++) {
        const si = anchors[ai], ei = anchors[ai+1];
        const A  = { lat:r[si].lat, lng:r[si].lng };
        const B  = { lat:r[ei].lat, lng:r[ei].lng };
        const ctrl = applyOffset((A.lat+B.lat)/2, (A.lng+B.lng)/2, arcOffset, side);
        const steps = ei - si;
        for (let k = 1; k < steps; k++) {
            const p = bezier(A, ctrl, B, k/steps);
            r[si+k].lat = p.lat; r[si+k].lng = p.lng; r[si+k]._computed = true;
        }
    }

    // ── Tail: entries after last anchor ──
    if (anchors.length > 0) {
        const lastAi = anchors[anchors.length - 1];
        const tailCount = n - lastAi - 1;
        if (tailCount > 0) {
            const A = { lat:r[lastAi].lat, lng:r[lastAi].lng };
            // Street direction: from second-to-last anchor to last, or infer from side
            // N/S sides run east-west → default forward direction is east (+lng)
            // E/W sides run north-south → default forward direction is north (-lat, i.e. decreasing lat)
            let dLng = 0, dLat = 0;
            if (anchors.length >= 2) {
                const prev = anchors[anchors.length - 2];
                const rawLat = A.lat - r[prev].lat;
                const rawLng = A.lng - r[prev].lng;
                const len = Math.sqrt(rawLat*rawLat + rawLng*rawLng) || 1;
                dLat = (rawLat/len) * 0.00014;
                dLng = (rawLng/len) * 0.00014;
            } else {
                // fallback defaults based on street orientation
                if (side === 'East' || side === 'West') { dLat = -0.00014; } // north-south street → project northward
                else                                    { dLng =  0.00014; } // east-west street  → project eastward
            }
            const ghost = { lat: A.lat + dLat*(tailCount+1), lng: A.lng + dLng*(tailCount+1) };
            const ctrl  = applyOffset((A.lat+ghost.lat)/2, (A.lng+ghost.lng)/2, arcOffset, side);
            for (let k = 1; k <= tailCount; k++) {
                const p = bezier(A, ctrl, ghost, k/(tailCount+1));
                r[lastAi+k].lat = p.lat; r[lastAi+k].lng = p.lng; r[lastAi+k]._computed = true;
            }
        }
    }

    // ── Head: entries before first anchor ──
    if (anchors.length > 0) {
        const firstAi = anchors[0];
        if (firstAi > 0) {
            const A = { lat:r[firstAi].lat, lng:r[firstAi].lng };
            let dLng = 0, dLat = 0;
            if (anchors.length >= 2) {
                const next = anchors[1];
                const rawLat = r[next].lat - A.lat;
                const rawLng = r[next].lng - A.lng;
                const len = Math.sqrt(rawLat*rawLat + rawLng*rawLng) || 1;
                dLat = -(rawLat/len) * 0.00014;
                dLng = -(rawLng/len) * 0.00014;
            } else {
                if (side === 'East' || side === 'West') { dLat =  0.00014; } // project southward (back)
                else                                    { dLng = -0.00014; } // project westward (back)
            }
            const ghost = { lat: A.lat + dLat*(firstAi+1), lng: A.lng + dLng*(firstAi+1) };
            const ctrl  = applyOffset((ghost.lat+A.lat)/2, (ghost.lng+A.lng)/2, arcOffset, side);
            for (let k = 0; k < firstAi; k++) {
                const t = (firstAi - k) / (firstAi + 1);
                const p = bezier(ghost, ctrl, A, t);
                r[k].lat = p.lat; r[k].lng = p.lng; r[k]._computed = true;
            }
        }
    }

    return r;
}

// ═══════════════════════════════════════════════════════════
//  LIVE STATE
//  For each year+side we store an array of "live" objects,
//  each with { lat, lng } that get animated frame-by-frame.
// ═══════════════════════════════════════════════════════════

// All cardinalities (sides) present in the data — supports North/South and East/West
const SIDES = [...new Set(directoryData.map(e => e.cardinality))].sort();

// Raw template entries per year+side (immutable originals)
const rawChains = {};
YEARS.forEach(year => {
    SIDES.forEach(side => {
        rawChains[`${year}-${side}`] = directoryData.filter(
            e => e.year === year && e.cardinality === side
        ).map(e => ({ ...e }));
    });
});

// Active year tracking
const activeYears = new Set([YEARS[0]]); // 1900 on by default

// Compute arc offset for a year given the current active set.
// For North/East: positive offset (bows north / east away from street centreline).
// For South/West: negative offset (bows south / west away from street centreline).
// The sign is applied to lat (North/South) or lng (East/West) by applyOffset().
//
// Ranking is done ONLY among active years that share the same street+side group.
// Years on different streets are independent and must not shift each other's offsets.
function arcOffsetForYear(year, side) {
    const sideSign = (side === 'North' || side === 'East') ? 1 : -1;

    // Streets present for this year+side
    const streets = new Set(
        (rawChains[`${year}-${side}`] || []).map(e => e.street)
    );

    // Active peers: years that have at least one entry on the same street+side
    const peers = [...activeYears].filter(y => {
        const chain = rawChains[`${y}-${side}`] || [];
        return chain.length > 0 && chain.some(e => streets.has(e.street));
    }).sort((a, b) => b - a); // newest first

    const N    = peers.length;
    const rank = peers.indexOf(year);
    if (rank < 0) return 0;

    // rank 0 → smallest offset, rank N-1 → MAX_ARC_OFFSET
    const magnitude = N === 1 ? MAX_ARC_OFFSET * 0.15 : MAX_ARC_OFFSET * (rank + 1) / N;
    return magnitude * sideSign;
}

// ── Leaflet layer objects ──
const markerLayers = {}; // `${year}-${side}-${idx}` → L.Marker
const polyLayers   = {}; // `${year}-${side}` → L.Polyline
const yearGroups   = {}; // year → L.LayerGroup (holds markers + polylines for that year)

YEARS.forEach(year => {
    yearGroups[year] = L.layerGroup();
    SIDES.forEach(side => {
        const key = `${year}-${side}`;
        // Placeholder polyline (empty)
        const poly = L.polyline([], { color:YEAR_COLORS[year], weight:1.5, opacity:0.85 })
            .bindTooltip(String(year), { sticky:true, direction:'top' });
        polyLayers[key] = poly;
        poly.addTo(yearGroups[year]);

        // Markers — created once for every entry; positions set by initPositions/animation
        rawChains[key].forEach((entry, idx) => {
            const mk = L.marker([0,0], { icon: makeIcon(entry, YEAR_COLORS[year]) });
            mk.bindTooltip(entry.listing, { direction:'top', offset:[0,-4] });
            mk.on('click', () => openModal(entry));
            markerLayers[`${key}-${idx}`] = mk;
            mk.addTo(yearGroups[year]);
        });
    });
});

// Cross-year layer (rebuilt on toggle)
let crossYearLayer = L.layerGroup().addTo(map);
const crossYearById = {};

// ═══════════════════════════════════════════════════════════
//  ICON FACTORY
// ═══════════════════════════════════════════════════════════
function makeIcon(entry, color) {
    const t = entry.type;
    let html, size;

    if (t === 'Intersection') {
        html = `<div style="position:relative;width:11px;height:11px;">
            <div style="position:absolute;top:4px;left:0;width:11px;height:3px;background:${color};border-radius:1px;"></div>
            <div style="position:absolute;left:4px;top:0;width:3px;height:11px;background:${color};border-radius:1px;"></div>
        </div>`;
        size = [11,11];
    } else if (t === 'Right-of-way') {
        html = `<div style="position:relative;width:11px;height:11px;">
            <div style="position:absolute;top:4px;left:0;width:11px;height:3px;border:1.5px solid ${color};border-radius:1px;box-sizing:border-box;"></div>
            <div style="position:absolute;left:4px;top:0;width:3px;height:11px;border:1.5px solid ${color};border-radius:1px;box-sizing:border-box;"></div>
        </div>`;
        size = [11,11];
    } else {
        html = `<div style="width:6px;height:6px;border-radius:50%;background:${color};border:1px solid rgba(255,255,255,0.65);box-shadow:0 0 2px rgba(0,0,0,0.4);"></div>`;
        size = [6,6];
    }
    return L.divIcon({ html, className:'', iconSize:size, iconAnchor:[size[0]/2,size[1]/2] });
}

// ═══════════════════════════════════════════════════════════
//  POSITIONED CHAIN CACHE
//  We store the current "from" positions and animate to "to".
// ═══════════════════════════════════════════════════════════
const currentPos = {}; // `${year}-${side}-${idx}` → { lat, lng }

function getTargetPositions(year, side) {
    const offset = arcOffsetForYear(year, side);
    return computeChain(rawChains[`${year}-${side}`], offset, side);
}

// Initialise positions for the default year (1900)
function initPositions() {
    YEARS.forEach(year => {
        SIDES.forEach(side => {
            const key     = `${year}-${side}`;
            const targets = getTargetPositions(year, side);
            targets.forEach((e, idx) => {
                if (e.lat == null) return;
                currentPos[`${key}-${idx}`] = { lat: e.lat, lng: e.lng };
                rawChains[key][idx]._computed = e._computed;
            });
        });
    });
    applyPositionsToMap();
}

function applyPositionsToMap() {
    YEARS.forEach(year => {
        SIDES.forEach(side => {
            const key   = `${year}-${side}`;
            const pts   = [];
            rawChains[key].forEach((entry, idx) => {
                const pos = currentPos[`${key}-${idx}`];
                if (!pos) return;
                const mk = markerLayers[`${key}-${idx}`];
                if (mk) {
                    if (pos) {
                        mk.setLatLng([pos.lat, pos.lng]);
                        if (!map.hasLayer(mk) && yearGroups[year] && map.hasLayer(yearGroups[year])) {
                            // marker is in the group; setLatLng is enough
                        }
                    }
                }
                pts.push([pos.lat, pos.lng]);
            });
            polyLayers[key].setLatLngs(pts);
        });
    });
}

// ═══════════════════════════════════════════════════════════
//  ANIMATION ENGINE
// ═══════════════════════════════════════════════════════════
let animHandle = null;
let animStart  = null;
const animFrom = {};
const animTo   = {};

function easeInOut(t) {
    return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
}

function startAnimation() {
    if (animHandle) cancelAnimationFrame(animHandle);

    // Snapshot current as "from"
    Object.assign(animFrom, JSON.parse(JSON.stringify(currentPos)));

    // Compute "to" for all active years
    Object.keys(animTo).forEach(k => delete animTo[k]);
    activeYears.forEach(year => {
        SIDES.forEach(side => {
            const key     = `${year}-${side}`;
            const targets = getTargetPositions(year, side);
            targets.forEach((e, idx) => {
                if (e.lat == null) return;
                animTo[`${key}-${idx}`] = { lat: e.lat, lng: e.lng };
            });
        });
    });

    animStart = null;
    animHandle = requestAnimationFrame(animFrame);
}

function animFrame(ts) {
    if (!animStart) animStart = ts;
    const elapsed = ts - animStart;
    const t       = Math.min(elapsed / ANIM_DURATION, 1);
    const ease    = easeInOut(t);

    // Interpolate all positions that have a "to" target
    Object.keys(animTo).forEach(k => {
        const from = animFrom[k] || animTo[k];
        const to   = animTo[k];
        currentPos[k] = {
            lat: from.lat + (to.lat - from.lat) * ease,
            lng: from.lng + (to.lng - from.lng) * ease,
        };
    });

    applyPositionsToMap();
    rebuildCrossYearLines();

    if (t < 1) {
        animHandle = requestAnimationFrame(animFrame);
    } else {
        animHandle = null;
    }
}

// ═══════════════════════════════════════════════════════════
//  CROSS-YEAR LINES
// ═══════════════════════════════════════════════════════════
// Build index
YEARS.forEach(year => {
    SIDES.forEach(side => {
        rawChains[`${year}-${side}`].forEach((e, idx) => {
            if (!e.crossYearId) return;
            if (!crossYearById[e.crossYearId]) crossYearById[e.crossYearId] = [];
            crossYearById[e.crossYearId].push({ year, side, idx });
        });
    });
});
Object.values(crossYearById).forEach(g => g.sort((a,b) => a.year - b.year));

function rebuildCrossYearLines() {
    crossYearLayer.clearLayers();
    Object.values(crossYearById).forEach(group => {
        for (let i = 0; i < group.length - 1; i++) {
            const a = group[i], b = group[i+1];
            if (!activeYears.has(a.year) || !activeYears.has(b.year)) continue;
            const posA = currentPos[`${a.year}-${a.side}-${a.idx}`];
            const posB = currentPos[`${b.year}-${b.side}-${b.idx}`];
            if (!posA || !posB) continue;
            L.polyline([[posA.lat,posA.lng],[posB.lat,posB.lng]],
                { color:'#222', weight:3.5, opacity:0.55, dashArray:'6,5' }).addTo(crossYearLayer);
            L.polyline([[posA.lat,posA.lng],[posB.lat,posB.lng]],
                { color:'#fff', weight:1.5, opacity:0.9,  dashArray:'6,5' }).addTo(crossYearLayer);
        }
    });
}

// ═══════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════
const modal    = document.getElementById('details-modal');
const mHeading = document.getElementById('modal-heading');
const mMeta    = document.getElementById('modal-meta');
const mBody    = document.getElementById('modal-body');
const mCoords  = document.getElementById('modal-coords');
document.getElementById('close-modal-btn').onclick = () => modal.style.display = 'none';
window.onclick = e => { if (e.target === modal) modal.style.display = 'none'; };

function openModal(entry) {
    mHeading.innerText = entry.listing;
    mMeta.innerText    = `${entry.year}  ·  ${entry.street}  ·  ${entry.cardinality} side  ·  p.${entry.pages}`;
    mBody.innerHTML    = entry.htmlContent || '';
    const key = `${entry.year}-${entry.cardinality}`;
    const idx = rawChains[key] ? rawChains[key].indexOf(entry) : -1;
    const pos = idx >= 0 ? currentPos[`${key}-${idx}`] : null;
    mCoords.innerText  = pos
        ? `${pos.lat.toFixed(7)}, ${pos.lng.toFixed(7)}${entry._computed ? ' (estimated)' : ''}`
        : 'Unknown';
    modal.style.display = 'flex';
}

// ═══════════════════════════════════════════════════════════
//  CONTROL PANEL
// ═══════════════════════════════════════════════════════════
function getTileUrl(source, id) {
    return source === 'vic'
        ? `https://mapwarper.prov.vic.gov.au/maps/tile/${id}/{z}/{x}/{y}.png`
        : `https://mapwarper.net/maps/tile/${id}/{z}/{x}/{y}.png`;
}

const CustomControl = L.Control.extend({
    options: { position:'topright' },
    onAdd() {
        const container = L.DomUtil.create('div', 'leaflet-control-layers');
        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.disableScrollPropagation(container);

        const homeLink = L.DomUtil.create('a', 'control-home-link', container);
        homeLink.href = '/order'; homeLink.innerText = '← Home';

        const yearTitle = L.DomUtil.create('div', 'panel-section-title', container);
        yearTitle.innerText = 'Directory Years';

        YEARS.forEach(year => {
            const row = L.DomUtil.create('label', 'year-row', container);
            const cb  = L.DomUtil.create('input', '', row);
            cb.type = 'checkbox'; cb.checked = (year === YEARS[0]);
            const swatch = L.DomUtil.create('span', 'year-swatch', row);
            swatch.style.background = YEAR_COLORS[year];
            row.appendChild(document.createTextNode(String(year)));

            L.DomEvent.on(cb, 'change', () => {
                if (cb.checked) {
                    activeYears.add(year);
                    yearGroups[year].addTo(map);
                } else {
                    activeYears.delete(year);
                    map.removeLayer(yearGroups[year]);
                }
                startAnimation();
            });
        });

        const mapTitle = L.DomUtil.create('div', 'panel-section-title', container);
        mapTitle.innerText = 'Historic Map Layers';

        mapConfig.forEach(config => {
            const row  = L.DomUtil.create('div', 'layer-control-row', container);
            const lbl  = L.DomUtil.create('label', 'layer-label-container', row);
            const cb   = L.DomUtil.create('input', '', lbl); cb.type = 'checkbox'; cb.checked = config.visibleByDefault;
            const span = L.DomUtil.create('span', '', lbl); span.innerText = config.label;
            const sc   = L.DomUtil.create('div', 'slider-container', row);
            sc.innerHTML = '<span>0%</span>';
            const sl   = L.DomUtil.create('input', 'opacity-slider', sc);
            sl.type = 'range'; sl.min = 0; sl.max = 100; sl.value = 100;
            sc.insertAdjacentHTML('beforeend', '<span>100%</span>');
            const layer = L.tileLayer(getTileUrl(config.source, config.id), { maxZoom:20, maxNativeZoom:19, opacity:1 });
            if (config.visibleByDefault) layer.addTo(map);
            L.DomEvent.on(cb, 'change', () => cb.checked ? layer.addTo(map) : map.removeLayer(layer));
            L.DomEvent.on(sl, 'input',  () => layer.setOpacity(sl.value/100));
        });

        return container;
    }
});
map.addControl(new CustomControl());

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
initPositions();
yearGroups[YEARS[0]].addTo(map); // 1900 visible by default
rebuildCrossYearLines();
</script>
</body>
</html>
